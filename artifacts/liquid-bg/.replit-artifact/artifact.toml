kind = "web"
previewPath = "/liquid-bg/"
title = "Liquid Animated Background"
version = "1.0.0"
id = "artifacts/liquid-bg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/liquid-bg/" ]
localPort = 18642

[services.development]
run = "pnpm --filter @workspace/liquid-bg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/liquid-bg", "run", "build" ]
publicDir = "artifacts/liquid-bg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18642"
BASE_PATH = "/liquid-bg/"
